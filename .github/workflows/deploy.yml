name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # The redesign preview lives at master:/preview (deployed manually, not
      # built from source on `main`). force_orphan wipes it on every deploy, so
      # carry it forward from the current Pages branch into the new build.
      - name: Carry forward /preview subdir
        run: |
          git fetch origin master --depth=1 2>/dev/null || true
          if git archive origin/master preview 2>/dev/null | tar -x -C ./out; then
            echo "✓ /preview preserved"
          else
            echo "ℹ no existing /preview to preserve"
          fi

      # Publishes the static export (out/) to the `master` branch, which
      # GitHub Pages serves at https://parththaker.github.io/.
      # Source lives on `main`; `master` is the generated build artifact.
      - name: Deploy to Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: master
          force_orphan: true
          user_name: parththaker
          user_email: parneh@gmail.com
          commit_message: "Deploy ${{ github.sha }}"
